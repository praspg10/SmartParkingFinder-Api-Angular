server.port=8080
spring.application.name=api-gateway

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**, /users/**

spring.cloud.gateway.routes[1].id=parking-lot-service
spring.cloud.gateway.routes[1].uri=lb://parking-lot-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/parking-lots/**

spring.cloud.gateway.routes[2].id=availability-service
spring.cloud.gateway.routes[2].uri=lb://availability-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/availability/**

spring.cloud.gateway.routes[3].id=reservation-service
spring.cloud.gateway.routes[3].uri=lb://reservation-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/reservations/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
